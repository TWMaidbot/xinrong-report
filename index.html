<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新榮永續 報工系統</title>
    <style>
        :root {
            --primary: #2d5a27;
            --primary-light: #4a8a42;
            --primary-dark: #1e3d1a;
            --accent: #f5a623;
            --success: #27ae60;
            --bg: #f5f5f0;
            --card: #fff;
            --text: #333;
            --text-light: #666;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg)
        }

        .page {
            display: none;
            min-height: 100vh;
            padding-bottom: 20px
        }

        .page.active {
            display: block
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 20px 20px;
        }

        @media (min-width: 601px) {
            .header {
                border-radius: 0 0 30px 30px;
                margin-bottom: 20px;
            }

            .page.active {
                display: grid;
                grid-template-columns: 250px 1fr;
                gap: 20px;
                align-items: start;
            }

            .page#login-page.active {
                display: block;
                max-width: 400px;
                margin: 0 auto;
            }

            .header.compact {
                grid-column: 1 / -1;
                border-radius: 12px;
                margin: 20px;
            }

            /* Dashboard Layout */
            .dashboard {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 20px;
                padding: 0 20px 20px 20px;
            }

            .stats-row {
                grid-column: 1 / -1;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }

            .section-title {
                grid-column: 1 / -1;
            }

            #machine-progress-container {
                grid-column: 1 / -1;
            }

            .machine-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }

            .timeline {
                max-height: 500px;
            }
        }

        .header.compact {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px
        }

        .header.compact h2 {
            flex: 1;
            text-align: center;
            margin-right: 40px
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer
        }

        .main-menu {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px
        }

        .menu-btn {
            background: var(--card);
            border: none;
            border-radius: 16px;
            padding: 25px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow);
            cursor: pointer
        }

        .menu-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed
        }

        .menu-btn .icon {
            font-size: 36px
        }

        .menu-btn .label {
            font-size: 20px;
            font-weight: 600;
            color: var(--text)
        }

        .report-form,
        .login-form {
            padding: 20px
        }

        .form-group {
            margin-bottom: 20px
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px
        }

        .form-group select,
        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input[type="date"] {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card)
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none
        }

        .quantity-input {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            padding: 10px;
            border-radius: 12px;
            border: 2px solid var(--border)
        }

        .quantity-input input {
            flex: 1;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            border: none;
            background: none;
            width: 80px
        }

        .qty-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer
        }

        .unit {
            display: block;
            text-align: center;
            margin-top: 8px;
            color: var(--text-light);
            font-size: 14px
        }

        .submit-btn,
        .login-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--success) 0%, #219a52 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px
        }

        .scan-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, #e09000 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px
        }

        .dashboard {
            padding: 20px
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 25px
        }

        .stat-card {
            background: var(--card);
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--shadow)
        }

        .stat-value {
            display: block;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary)
        }

        .stat-label {
            display: block;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 5px
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 15px
        }

        .machine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            /* Add spacing below each grid */
        }

        .category-separator {
            grid-column: 1 / -1;
            border-top: 1px dashed var(--primary);
            /* Lighter, themed separator */
            opacity: 0.3;
            margin: 20px 0 20px 0;
            width: 100%;
            display: block;
        }

        /* First separator shouldn't be needed or distinct style? */
        /* User image shows lines between rows. */
        .machine-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--shadow)
        }

        .machine-card .machine-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px
        }

        .machine-card .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px
        }

        .machine-card .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            border-radius: 4px
        }

        .machine-card .machine-count {
            font-size: 12px;
            color: var(--text-light)
        }

        .timeline {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            box-shadow: var(--shadow);
            max-height: 300px;
            overflow-y: auto
        }

        .timeline-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border)
        }

        .timeline-item:last-child {
            border-bottom: none
        }

        .timeline-time {
            font-size: 12px;
            color: var(--text-light);
            min-width: 50px
        }

        .timeline-content {
            flex: 1
        }

        .timeline-machine {
            font-weight: 600;
            font-size: 14px
        }

        .timeline-detail {
            font-size: 12px;
            color: var(--text-light)
        }

        .timeline-worker {
            font-size: 11px;
            color: var(--primary);
            margin-top: 2px
        }

        .category-stats-grid {
            grid-column: 1 / -1;
            display: grid;
            /* Try to fit 5 columns on large screens */
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .category-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0;
            /* Boxy look per request */
            padding: 15px;
            box-shadow: none;
            /* Minimalist */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .category-header {
            font-size: 18px;
            font-weight: normal;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #ccc;
            width: 100%;
            text-align: center;
            color: #555;
        }

        .stat-list {
            width: 100%;
            text-align: right;
            /* Labels left, numbers right */
            padding: 0 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 20px;
            /* Increased from 16px */
            color: #333;
        }

        .stat-label {
            color: #666;
            font-size: 18px;
            /* Slightly smaller than value maybe? Or same. Let's make label distinct */
        }

        .stat-value {
            font-weight: bold;
            font-size: 22px;
            /* Emphasize numbers */
        }

        .history {
            padding: 20px
        }

        .history-item {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: var(--shadow)
        }

        .history-item .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px
        }

        .history-item .history-machine {
            font-weight: 600
        }

        .history-item .history-time {
            font-size: 12px;
            color: var(--text-light)
        }

        .history-item .history-detail {
            font-size: 14px;
            color: var(--text-light)
        }

        .history-item .history-worker {
            font-size: 12px;
            color: var(--primary);
            margin-top: 5px
        }

        .export-btn,
        .filter-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            background: var(--card);
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 10px
        }

        .export-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px
        }

        .filter-section {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: var(--shadow)
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px
        }

        .filter-row input,
        .filter-row select {
            padding: 12px;
            font-size: 14px
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: #fff;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 1000
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-size: 12px
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light)
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 10px
        }

        .user-info {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-left: 10px;
            cursor: pointer
        }

        .coworker-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px
        }

        .coworker-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            padding: 10px 14px;
            border-radius: 20px;
            border: 2px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s
        }

        .coworker-chip.selected {
            border-color: var(--primary);
            background: rgba(45, 90, 39, 0.15);
            color: var(--primary);
            font-weight: 600
        }

        .coworker-chip:active {
            transform: scale(0.95)
        }

        .login-preview {
            background: rgba(45, 90, 39, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            display: none
        }

        .login-preview.show {
            display: block
        }

        .login-preview .name {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary)
        }

        .login-preview .role {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 5px
        }

        .login-error {
            color: #c62828;
            font-size: 13px;
            margin-top: 8px;
            display: none
        }

        .login-error.show {
            display: block
        }

        .user-list {
            padding: 20px
        }

        .user-item {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .user-item .user-left {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .user-item .user-id {
            font-size: 12px;
            color: var(--text-light);
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 6px
        }

        .user-item .user-name {
            font-weight: 600
        }

        .user-item .user-role {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px
        }

        .user-item .user-role.admin {
            background: #e3f2fd;
            color: #1976d2
        }

        .user-item .user-role.manager {
            background: #fff3e0;
            color: #f57c00
        }

        .user-item .user-role.worker {
            background: #e8f5e9;
            color: #388e3c
        }

        .user-item .user-actions {
            display: flex;
            gap: 8px
        }

        .user-item .user-actions button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer
        }

        .user-item .btn-edit {
            background: #e3f2fd;
            color: #1976d2
        }

        .user-item .btn-delete {
            background: #ffebee;
            color: #c62828
        }

        .add-user-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            display: none
        }

        .modal-overlay.show {
            display: flex
        }

        .modal {
            background: var(--card);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 400px
        }

        .modal h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--primary)
        }

        .modal .form-group select {
            width: 100%
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px
        }

        .modal-actions button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer
        }

        .modal-actions .btn-cancel {
            background: var(--bg);
            color: var(--text)
        }

        .modal-actions .btn-save {
            background: var(--primary);
            color: #fff
        }

        /* Desktop Sidebar Layout */
        @media (min-width: 768px) {
            .app {
                max-width: none;
                margin: 0;
                display: grid;
                grid-template-columns: 260px 1fr;
                min-height: 100vh;
            }

            .sidebar {
                display: block !important;
                background: #1e3d1a;
                color: #fff;
                padding: 20px;
                height: 100vh;
                position: sticky;
                top: 0;
                overflow-y: auto;
            }

            .sidebar .logo-area {
                text-align: center;
                margin-bottom: 40px;
            }

            .sidebar .logo-area img {
                height: 80px;
            }

            .sidebar h1 {
                font-size: 20px;
                margin-top: 10px;
            }

            .nav-link {
                display: flex;
                align-items: center;
                gap: 15px;
                padding: 15px;
                color: rgba(255, 255, 255, 0.7);
                text-decoration: none;
                border-radius: 12px;
                margin-bottom: 5px;
                cursor: pointer;
                transition: 0.2s;
            }

            .nav-link:hover,
            .nav-link.active {
                background: rgba(255, 255, 255, 0.1);
                color: #fff;
            }

            .nav-link.active {
                background: var(--primary-light);
            }

            .nav-link .icon {
                font-size: 20px;
            }

            .main-content {
                padding: 30px;
                background: #f8f9fa;
                height: 100vh;
                overflow-y: auto;
            }

            /* Hide Mobile Header on Desktop in Dashboard Mode */
            .page header:not(.compact) {
                display: none;
            }

            .page .header.compact .back-btn {
                display: none;
            }

            /* Reset Page Grid from previous media query */
            .page.active {
                display: block;
                grid-template-columns: none;
                gap: 0;
            }

            /* Center Content Containers */
            .report-form {
                max-width: 800px;
                margin: 0 auto;
                background: #fff;
                padding: 40px;
                border-radius: 16px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            }

            /* Hide back button */

            /* Grid Layouts for lists */
            #machine-list-container,
            #user-list-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }

            /* Dashboard adjust */
            .dashboard {
                padding: 0;
            }

            .stats-row {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }

            .machine-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            /* Hide Mobile Menu Page */
            #home-page .main-menu {
                display: none;
            }

            #home-page .header {
                display: none;
            }

            #home-page {
                padding: 0;
            }

            #home-page:after {
                content: '請由左側選單選擇功能';
                display: block;
                text-align: center;
                margin-top: 100px;
                color: #999;
                font-size: 20px;
            }
        }

        .sidebar {
            display: none;
        }

        /* Hidden on mobile */
        .main-content {
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Sidebar (Desktop Only) -->
        <aside class="sidebar">
            <div class="logo-area">
                <img src="assets/logo.png" alt="Logo">
                <h1>新榮永續</h1>
            </div>
            <nav>
                <div class="nav-link" onclick="showPage('report-page')">
                    <span class="icon">📝</span> 報工
                </div>
                <div class="nav-link" id="nav-dashboard" onclick="showPage('dashboard-page')">
                    <span class="icon">📊</span> 戰情看板
                </div>
                <div class="nav-link" id="nav-history" onclick="showPage('history-page')">
                    <span class="icon">📋</span> 報工紀錄
                </div>
                <div class="nav-link" id="nav-users" onclick="showPage('users-page')">
                    <span class="icon">👥</span> 使用者管理
                </div>
                <div class="nav-link" id="nav-machines" onclick="showPage('machines-page')">
                    <span class="icon">⚙️</span> 機台管理
                </div>
            </nav>
            <div style="margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div class="user-info" style="background:none;padding:0;color:#fff;margin:0">
                    👤 <span id="sidebar-user-name">-</span>
                    <button class="logout-btn" onclick="doLogout()">登出</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- 登入頁面 -->
            <div id="login-page" class="page active"
                style="max-width:400px;margin:20px auto;background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                <header class="header" style="border-radius:20px 20px 0 0;margin:-30px -30px 20px -30px;">
                    <div class="logo"><img src="assets/logo.png" alt="Logo" style="height: 60px;"></div>
                    <h1>新榮永續</h1>

        <!-- Firebase SDKs -->

        <!-- 初始化 Firebase (如果有設定) -->
        <script>
            let db = null;
            if (typeof firebase !== 'undefined' && typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey !== "YOUR_API_KEY") {
                try {
                    const app = firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    console.log("Firebase initialized");
                } catch (e) {
                    console.error("Firebase init error:", e);
                    showToast("Firebase 連線失敗");

            } else {
                console.log("Firebase config not found, using LocalStorage");

        <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
        <script>
            const STORAGE_KEY = 'xinrong_reports_v5';
            const USER_KEY = 'xinrong_user';
            const USERS_KEY = 'xinrong_users_v8';

            // 預設員工名冊
            const defaultEmployees = [
                { id: 'H01', name: '吳界', role: 'admin' },
                { id: 'P02', name: '王雅惠', role: 'worker' },
                { id: 'P03', name: '葉世光', role: 'worker' },
                { id: 'P04', name: '阮氏草', role: 'worker' },
                { id: 'P06', name: '李群', role: 'worker' },
                { id: 'P07', name: '羅國維', role: 'worker' },
                { id: 'P08', name: '吳均婕', role: 'worker' },
                { id: 'P10', name: '楊子威', role: 'worker' },
                { id: 'P11', name: '陳智偉', role: 'worker' },
                { id: 'P12', name: '陳曉東', role: 'worker' },
                { id: 'P13', name: '林玉珠', role: 'worker' },
                { id: 'P14', name: '陳欽勇', role: 'worker' },
                { id: 'P17', name: '邱志祥', role: 'worker' },
                { id: 'P21', name: '羅唯瑜', role: 'worker' },
                { id: 'P23', name: '莊峻溢', role: 'worker' },
                { id: 'P24', name: '潘曉傑', role: 'worker' },
                { id: 'S01', name: '鐘議德', role: 'worker' }
            ];

            async function getEmployees() {
                if (db) {
                    try {
                        const snapshot = await db.collection('users').get();
                        if (!snapshot.empty) {
                            const list = [];
                            snapshot.forEach(doc => list.push(doc.data()));
                            localStorage.setItem(USERS_KEY, JSON.stringify(list)); // 快取一份供離線用
                            return list;
                        }
                    } catch (e) { console.error("DB Error", e); }
                }
                // Fallback to LocalStorage
                const saved = localStorage.getItem(USERS_KEY);
                if (saved) {
                    const list = JSON.parse(saved);
                    // 如果列表為空 (意外清空)，則回復預設值，確保至少有管理者
                    if (list && list.length > 0) return list;
                }
                localStorage.setItem(USERS_KEY, JSON.stringify(defaultEmployees));
                return defaultEmployees;
            }
            async function saveEmployees(list) {
                if (db) {
                    // 全量覆蓋策略 (簡單粗暴但有效) - 實際應單筆更新
                    // 這裡為了簡化 Prototype，我們先更新 LocalStorage，再非同步更新 DB
                    list.forEach(u => {
                        db.collection('users').doc(u.id).set(u).catch(e => console.error(e));
                    });
                }
                localStorage.setItem(USERS_KEY, JSON.stringify(list));
            }

            const MACHINES_KEY = 'xinrong_machines_v1';
            // Default machines as constant for initialization
            const defaultMachines = [
                { id: 'M101', name: '大剪台(上下剪)', category: '剪台' }, { id: 'M102', name: '大剪台(甩剪)', category: '剪台' }, { id: 'M103', name: '小剪台', category: '剪台' },
                { id: 'M201', name: '多片機(大)', category: '多片機' }, { id: 'M202', name: '多片機(小)', category: '多片機' },
                { id: 'M301', name: '凹槽機(大)', category: '凹槽機/斜角' }, { id: 'M302', name: '凹槽機(小)', category: '凹槽機/斜角' }, { id: 'M303', name: '斜角', category: '凹槽機/斜角' },
                { id: 'M401', name: '合板機', category: '合板機' },
                { id: 'M501', name: '棧板', category: '棧板' }, { id: 'M502', name: '棧板', category: '棧板' }, { id: 'M503', name: '棧板', category: '棧板' }, { id: 'M504', name: '棧板', category: '棧板' }
            ];

            async function getMachines() {
                if (db) {
                    try {
                        const snapshot = await db.collection('machines').orderBy('id').get();
                        if (!snapshot.empty) {
                            const list = [];
                            snapshot.forEach(doc => list.push(doc.data()));
                            localStorage.setItem(MACHINES_KEY, JSON.stringify(list));
                            return list;
                        }
                    } catch (e) { console.error("DB Error", e); }
                }
                const saved = localStorage.getItem(MACHINES_KEY);
                if (saved) return JSON.parse(saved);
                localStorage.setItem(MACHINES_KEY, JSON.stringify(defaultMachines));
                return defaultMachines;
            }

            async function saveMachine(machine) {
                if (db) {
                    try { await db.collection('machines').doc(machine.id).set(machine); }
                    catch (e) { console.error(e); }
                }
                const list = await getMachines();
                const idx = list.findIndex(m => m.id === machine.id);
                if (idx >= 0) list[idx] = machine; else list.push(machine);
                // Sort by ID
                list.sort((a, b) => a.id.localeCompare(b.id));
                localStorage.setItem(MACHINES_KEY, JSON.stringify(list));
            }

            async function deleteMachine(id) {
                if (db) {
                    try { await db.collection('machines').doc(id).delete(); }
                    catch (e) { console.error(e); }
                }
                let list = await getMachines();
                list = list.filter(m => m.id !== id);
                localStorage.setItem(MACHINES_KEY, JSON.stringify(list));
                return list;
            }

            const categoryWorkTypes = {
                '剪台': [{ id: 'log', name: '原木', unit: '件' }, { id: 'scrap', name: '餘料', unit: '隻' }, { id: 'board', name: '板材', unit: '片' }],
                '多片機': [{ id: 'plank', name: '板子', unit: '片' }, { id: 'strip', name: '木條', unit: '隻' }, { id: 'chip', name: '改木粒', unit: '隻' }],
                '凹槽機/斜角': [{ id: 'groove', name: '凹槽', unit: '隻' }, { id: 'bevel', name: '斜角', unit: '隻' }],
                '合板機': [{ id: 'panel', name: '面板', unit: '片' }, { id: 'slat', name: '條子', unit: '片' }],
                '棧板': [{ id: 'pallet', name: '棧板', unit: '片' }, { id: 'cover', name: '蓋板、面板', unit: '片' }, { id: 'box', name: '木箱', unit: '個' }, { id: 'combo', name: '組合', unit: '片' }]
            };

            async function getWorkTypesForMachine(machineId) {
                const machines = await getMachines();
                const m = machines.find(x => x.id === machineId);
                if (!m) return [];
                const cat = m.category || '剪台';
                return categoryWorkTypes[cat] || [];
            }

            const roleLabels = { admin: '管理者', manager: '主管', worker: '一般員工' };

            let currentUser = null;
            let filteredReports = [];
            let selectedCoworkers = new Set();
            let editingUserId = null;

            // 登入相關
            const loginInput = document.getElementById('login-id');
            loginInput.addEventListener('input', function () {
                const id = this.value.toUpperCase().trim();
                getEmployees().then(employees => {
                    const user = employees.find(e => e.id === id);
                    const preview = document.getElementById('login-preview');
                    const error = document.getElementById('login-error');

                    if (user) {
                        document.getElementById('preview-name').textContent = user.name;
                        document.getElementById('preview-role').textContent = roleLabels[user.role] || '員工';
                        preview.classList.add('show');
                        error.classList.remove('show');
                    } else {
                        preview.classList.remove('show');
                    }
                });
            });
            loginInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') doLogin(); });

            async function doLogin() {
                // Debugging
                console.log('doLogin called');
                const idInput = document.getElementById('login-id');
                const id = idInput.value.toUpperCase().trim();
                console.log('Login attempt with ID:', id);

                if (!id) {
                    showToast('請輸入工號');
                    return;
                }

                try {
                    const employees = await getEmployees();
                    console.log('Employees loaded:', employees);
                    const user = employees.find(e => e.id === id);

                    if (!user) {
                        console.log('User not found');
                        document.getElementById('login-error').classList.add('show');
                        showToast('工號不存在');
                        return;
                    }

                    console.log('User found:', user);
                    currentUser = user;
                    localStorage.setItem(USER_KEY, JSON.stringify(user));
                    localStorage.setItem(USER_KEY, JSON.stringify(user));
                    document.getElementById('current-user-name').textContent = `${user.name}（${user.id}）`;
                    document.getElementById('sidebar-user-name').textContent = `${user.name}（${user.id}）`;
                    updateMenuVisibility();
                    showPage('home-page');
                    showToast(`歡迎，${user.name}！`);
                } catch (err) {
                    console.error('Login error:', err);
                    alert('系統錯誤: ' + err);
                }
            }

            function doLogout() {
                currentUser = null;
                localStorage.removeItem(USER_KEY);
                document.getElementById('login-id').value = '';
                document.getElementById('login-preview').classList.remove('show');
                document.getElementById('login-error').classList.remove('show');
                showPage('login-page');
            }

            function checkLogin() {
                const saved = localStorage.getItem(USER_KEY);
                if (saved) {
                    currentUser = JSON.parse(saved);
                    // 確認用戶還存在
                    getEmployees().then(employees => {
                        const stillExists = employees.find(e => e.id === currentUser.id);
                        if (stillExists) {
                            currentUser = stillExists; // 更新權限
                            document.getElementById('current-user-name').textContent = `${currentUser.name}（${currentUser.id}）`;
                            document.getElementById('sidebar-user-name').textContent = `${currentUser.name}（${currentUser.id}）`;
                            updateMenuVisibility();
                        }
                    });
                    return true; // 先回傳 LocalStorage 的結果讓 UI 顯示
                }
                return false;
            }

            function updateMenuVisibility() {
                const canViewDashboard = currentUser.role === 'admin' || currentUser.role === 'manager';
                const canManageUsers = currentUser.role === 'admin';

                // Mobile Menu
                document.getElementById('menu-dashboard').disabled = !canViewDashboard;
                document.getElementById('menu-dashboard').style.display = canViewDashboard ? '' : 'none';
                document.getElementById('menu-history').disabled = !canViewDashboard;
                document.getElementById('menu-history').style.display = canViewDashboard ? '' : 'none';
                document.getElementById('menu-users').disabled = !canManageUsers;
                document.getElementById('menu-users').style.display = canManageUsers ? '' : 'none';
                document.getElementById('menu-machines').disabled = !canManageUsers;
                document.getElementById('menu-machines').style.display = canManageUsers ? '' : 'none';

                // Sidebar Menu (Desktop)
                document.getElementById('nav-dashboard').style.display = canViewDashboard ? 'flex' : 'none';
                document.getElementById('nav-history').style.display = canViewDashboard ? 'flex' : 'none';

            function toggleCoworker(el) {
                const id = el.dataset.id;
                // If clicking an already selected one, deselect it
                if (selectedCoworkers.has(id)) {
                    selectedCoworkers.delete(id);
                    el.classList.remove('selected');
                    return;
                }

                // New Logic: Single Select - Clear previous selection
                if (selectedCoworkers.size > 0) {
                    selectedCoworkers.clear();

            async function onScanSuccess(decodedText, decodedResult) {
                // 假設掃到的內容是網址如 https://...?m=M101 或直接是 M101
                // 我們嘗試擷取機台代號           // 我們嘗試擷取機台代號
                let machineId = decodedText.toUpperCase().trim();

                // 簡單解析：如果包含 =M... 取後面，否則直接用
                if (decodedText.includes('=')) {
                    const parts = decodedText.split('=');
                    machineId = parts[parts.length - 1].toUpperCase().trim();
                }

                const machines = await getMachines();
                const sel = document.getElementById('machine-select');
                if (machines.some(m => m.id === machineId)) {
                    sel.value = machineId;
                    sel.dispatchEvent(new Event('change'));
                    showToast(`掃描成功：${machineId}`);
                    stopScanner();

                    // 震動回饋
                    if (navigator.vibrate) navigator.vibrate(200);
                } else {
                    console.log(`掃描到無效代號: ${machineId}`);
                }
            }

            async function saveReport(r) {
                if (db) {
                    try {
                        await db.collection('reports').add(r);
                    } catch (e) {
                        console.error("DB Save Error", e);
                        showToast("⚠️ 雲端備份失敗，僅儲存於本地");

                }
                const rs = await getReports();
                rs.unshift(r);

            async function getReports() {
                // 優先讀取 LocalStorage 以求速度，但會在背景同步
                // 為了戰情看板即時性，如果連上 DB 應該要讀 DB
                if (db) {
                    try {
                        // 簡單實作：只抓最近 500 筆
                        const snapshot = await db.collection('reports').orderBy('timestamp', 'desc').limit(500).get();
                        if (!snapshot.empty) {
                            const list = [];
                            snapshot.forEach(doc => list.push(doc.data()));
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
                            return list;
                        }
                    } catch (e) { console.error("DB Read Error", e); }
                }

                try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
            }

            async function updateDashboard() {
                const rs = await getTodayReports();
                const machines = await getMachines();

                // --- New Category Stats Logic ---
                const grid = document.getElementById('category-stats-grid');
                grid.innerHTML = '';

                // We need to iterate over defined categories to preserve order (if desired) or just predefined set
                // Let's use the keys from categoryWorkTypes as the source of truth for categories
                const categories = ['棧板', '剪台', '多片機', '凹槽機/斜角', '合板機'];

                categories.forEach(cat => {
                    const workTypes = categoryWorkTypes[cat];
                    // Find all machines in this category
                    const catMachines = machines.filter(m => (m.category || '剪台') === cat).map(m => m.id);

                    // Filter reports for these machines
                    const catReports = rs.filter(r => catMachines.includes(r.machine));

                    // Aggregate by work type
                    // Initialize with 0 for all known work types in this category
                    const stats = {};
                    workTypes.forEach(wt => stats[wt.name] = 0);

                    catReports.forEach(r => {
                        // We use workTypeName because r.workType is the ID (e.g. 'log'), but display uses Name
                        // However, to be safe, let's map ID back to Name if possible, or just use registered names.
                        // r.workTypeName should be reliable (saved at report time). 
                        // But if we want to align with the specific list in categoryWorkTypes:

                        // Try to match by ID first?
                        // Actually, r.quantity is what we sum.
                        // Let's sum by 'workTypeName' as it's what counts. 
                        // Wait, if I have 'Log' (ID: log) and 'Log' (ID: log2), they might differ. 
                        // But our categoryWorkTypes defines unique IDs per category.

                        // Let's try to match r.workType (the ID) to the known list
                        const known = workTypes.find(wt => wt.id === r.workType);
                        if (known) {
                            stats[known.name] = (stats[known.name] || 0) + r.quantity;
                        } else {
                            // Fallback for unknown/legacy types?
                            // stats[r.workTypeName] = (stats[r.workTypeName] || 0) + r.quantity;
                        }
                    });

                    // Render Card
                    let listHtml = '';
                    workTypes.forEach(wt => {
                        const val = stats[wt.name] || 0;
                        // Only show if we want to show 0s? The mockup shows 0s (blank circles really, but let's show numbers).
                        listHtml += `
                            <div class="stat-row">
                                <span class="stat-label">${wt.name}</span>
                                <span class="stat-value">${val}</span>
                            </div>
                         `;
                    });

                    grid.innerHTML += `
                        <div class="category-card">
                            <div class="category-header">${cat}</div>
                            <div class="stat-list">
                                ${listHtml}
                            </div>
                        </div>
                    `;
                });

                // --- Machine Progress (Keep existing logic) ---
                // --- Machine Progress (Grouped by Category) ---
                const mpContainer = document.getElementById('machine-progress-container');
                mpContainer.innerHTML = '';

                let isFirstGroup = true;

                categories.forEach(cat => {
                    const catMachines = machines.filter(m => (m.category || '剪台') === cat);
                    if (catMachines.length === 0) return;

                    // Add Separator (except for first group if we want clean top, but user image implies lines... 
                    // actually user image shows lines BETWEEN groups. Let's put a line at the top of subsequent groups or bottom of previous.
                    // Let's just put a line before every group EXCEPT the very first one? 
                    // Or simply between them.
                    if (!isFirstGroup) {
                        mpContainer.innerHTML += `<div class="category-separator"></div>`;
                    }
                    isFirstGroup = false;

                    // Create a grid for this category
                    // We render the HTML string for the grid
                    let gridHtml = '<div class="machine-grid">';
                    catMachines.forEach(m => {
                        const mr = rs.filter(r => r.machine === m.id);
                        const tot = mr.reduce((s, r) => s + r.quantity, 0);
                        const pct = Math.min(100, Math.round((tot / 50) * 100)); // 假設目標 50
                        gridHtml += `<div class="machine-card"><div class="machine-name">${m.id} ${m.name}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="machine-count">${mr.length} 次報工</div></div>`;
                    });
                    gridHtml += '</div>';

                    mpContainer.innerHTML += gridHtml;
                });
            }

            async function deleteReport(reportId) {
                if (!confirm('確定要刪除這筆報工紀錄嗎？')) return;

                // 1. Delete from LocalStorage
                let rs = await getReports();
                rs = rs.filter(r => r.id !== reportId);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(rs));

                // 2. Delete from Firestore (Query by id field)
                if (db) {
                    try {
                        const q = await db.collection('reports').where('id', '==', reportId).get();
                        q.forEach(doc => doc.ref.delete());
                    } catch (e) {
                        console.error("DB Delete Error", e);
                        showToast("⚠️ 雲端刪除失敗");
                    }
                }

                updateHistory();
                filteredReports = await getReports(); // Refresh filtered cache
                showToast('已刪除');
            }

            async function editReport(reportId) {
                const rs = await getReports();
                const r = rs.find(x => x.id === reportId);
                if (!r) return;

                const newQty = prompt(`修改 ${r.machineName} - ${r.workTypeName} 的數量：`, r.quantity);
                if (newQty === null) return;
                const q = parseInt(newQty);
                if (isNaN(q) || q <= 0) { showToast('請輸入有效的數字'); return; }

                // 1. Update LocalStorage
                r.quantity = q;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(rs));

                // 2. Update Firestore
                if (db) {
                    try {
                        const qSnap = await db.collection('reports').where('id', '==', reportId).get();
                        qSnap.forEach(doc => doc.ref.update({ quantity: q }));
                    } catch (e) {
                        console.error("DB Update Error", e);
                        showToast("⚠️ 雲端更新失敗");
                    }
                }

                updateHistory();
                filteredReports = await getReports(); // Refresh filtered cache
                showToast('更新成功');
            }

            function exportCSV(rs, fn) {
                if (rs.length === 0) { showToast('沒有資料'); return; }
                const h = ['時間', '機台', '機台名稱', '工作類型', '數量', '單位', '報工者', '共同作業者', '備註'];
                const rows = rs.map(r => [r.timestamp, r.machine, r.machineName, r.workTypeName, r.quantity, r.unit, r.worker, (r.coworkers || []).join('/'), r.note || '']);
                const csv = [h, ...rows].map(row => row.map(c => `"${c}"`).join(',')).join('\n');
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${fn}.csv`; a.click();
                showToast('匯出成功！');
            }

            async function saveUser() {
                const id = document.getElementById('modal-id').value.toUpperCase().trim();
                const name = document.getElementById('modal-name').value.trim();
                const role = document.getElementById('modal-role').value;

                if (!id || !name) { showToast('請填寫完整資料'); return; }

                let employees = await getEmployees();

                if (editingUserId) {
                    const idx = employees.findIndex(e => e.id === editingUserId);
                    if (idx !== -1) {
                        employees[idx] = { ...employees[idx], name, role };
                    }
                    if (db) {
                        try { await db.collection('employees').doc(editingUserId).update({ name, role }); }
                        catch (e) { console.error(e); }
                    }
                } else {
                    if (employees.find(e => e.id === id)) {
                        showToast('此工號已存在'); return;
                    }
                    const newUser = { id, name, role };
                    employees.push(newUser);
                    if (db) {
                        try { await db.collection('employees').doc(id).set(newUser); }
                        catch (e) { console.error(e); }
                    }
                }

                saveEmployees(employees);
                closeUserModal();
                renderUserList();
                showToast('儲存成功！');
            }

            async function deleteUser(id) {
                if (id === currentUser.id) { showToast('無法刪除自己'); return; }
                if (!confirm(`確定要刪除使用者 ${id}？`)) return;

                let employees = await getEmployees();
                employees = employees.filter(e => e.id !== id);
                saveEmployees(employees);

                if (db) {
                    try { await db.collection('employees').doc(id).delete(); }
                    catch (e) { console.error("DB Delete Error", e); }
                }

                renderUserList();
                showToast('已刪除');
            }

                            <button class="btn-delete" style="background:#fff3e0;color:#f57c00" onclick="printMachineQR('${m.id}')">🖨️ QR</button>
                            <button class="btn-edit" onclick="editMachine('${m.id}')">編輯</button>
                            <button class="btn-delete" onclick="deleteMachineUI('${m.id}')">刪除</button>
                        </div>
                    </div>
                `).join('');
            }

            function showAddMachineModal() {
                editingMachineId = null;
                document.getElementById('machine-modal-title').textContent = '新增機台';
                document.getElementById('machine-id').value = '';
                document.getElementById('machine-id').disabled = false;
                document.getElementById('machine-name').value = '';
                document.getElementById('machine-category').value = '剪台';
                document.getElementById('machine-modal').classList.add('show');
            }



            // 機台管理
            async function renderMachineList() {
                const machines = await getMachines();
                const container = document.getElementById('machine-list-container');
                container.innerHTML = machines.map(m => `
                    <div class="user-item" style="display:flex;flex-direction:column;align-items:flex-start;">
                        <div style="font-weight:bold;font-size:18px;margin-bottom:5px;">${m.id}</div>
                        <div style="margin-bottom:5px;">${m.name}</div>
                        <div style="font-size:12px;color:#666;margin-bottom:10px;">分類: ${m.category || '未分類'}</div>
                        <div class="user-actions" style="width:100%;display:flex;justify-content:flex-end;">
                            <button class="btn-edit" onclick="printMachineQR('${m.id}')">🖨️ QR</button>
                            <button class="btn-edit" onclick='editMachine(${JSON.stringify(m)})'>編輯</button>
                            <button class="btn-delete" onclick="deleteMachineUI('${m.id}')">刪除</button>
                        </div>
                    </div>
                `).join('');
            }

            function showAddMachineModal() {
                document.getElementById('machine-modal-title').textContent = '新增機台';
                document.getElementById('machine-id').value = '';
                document.getElementById('machine-id').disabled = false;
                document.getElementById('machine-name').value = '';
                document.getElementById('machine-category').value = '剪台';
                document.getElementById('machine-modal').classList.add('show');
            }

            function editMachine(m) {
                // If m is a string (id), try to find it (backward compatibility or if called with ID)
                if (typeof m === 'string') {
                    getMachines().then(machines => {
                        const found = machines.find(x => x.id === m);
                        if (found) editMachine(found);
                    });
                    return;
                }

                document.getElementById('machine-modal-title').textContent = '編輯機台';
                document.getElementById('machine-id').value = m.id;
                document.getElementById('machine-id').disabled = true;
                document.getElementById('machine-name').value = m.name;
                document.getElementById('machine-category').value = m.category || '剪台';
                document.getElementById('machine-modal').classList.add('show');
            }

            function closeMachineModal() {
                document.getElementById('machine-modal').classList.remove('show');
            }

            async function saveMachineUI() {
                const id = document.getElementById('machine-id').value.toUpperCase().trim();
                const name = document.getElementById('machine-name').value.trim();
                const category = document.getElementById('machine-category').value;

                if (!id || !name) { showToast('請填寫完整資料'); return; }

                await saveMachine({ id, name, category });
                closeMachineModal();
                renderMachineList();
                showToast('儲存成功！');
            }

            async function deleteMachineUI(id) {
                if (!confirm(`確定要刪除機台 ${id}？`)) return;
                await deleteMachine(id);
                renderMachineList();
                showToast('已刪除');
            }

            let editingMachineId = null;

            // QR Code 列印
            function printMachineQR(id) {
                const url = `https://${window.location.host}${window.location.pathname}?m=${id}`;
                // 這裡我們暫時只印一個
                printQRCodes([id]);
            }

            async function printAllQRCodes() {
                const machines = await getMachines();
                printQRCodes(machines.map(m => m.id));
            }

            async function printQRCodes(ids) {
                const machines = await getMachines();
                const printWindow = window.open('', '_blank');

                const style = `
                    body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; }
                    .qr-card { border: 2px solid #000; padding: 20px; text-align: center; width: 220px; page-break-inside: avoid; }
                    .qr-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
                    .qr-code { margin: 0 auto; display: flex; justify-content: center; }
                    .qr-name { font-size: 16px; margin-top: 10px; }
                    @media print { .no-print { display: none; } }
                `;

                const htmlContent = `
                    <div class="no-print" style="width:100%;margin-bottom:20px;">
                        <button onclick="window.print()" style="padding:10px 20px;font-size:20px;">🖨️ 列印</button>
                    </div>
                ` + ids.map(id => {
                    const m = machines.find(x => x.id === id);
                    return `
                    <div class="qr-card">
                        <div class="qr-title">${id}</div>
                        <div id="qr-${id}" class="qr-code"></div>
                        <div class="qr-name">${m?.name || ''}</div>
                    </div>`;
                }).join('');

                printWindow.document.write(`<html><head><title>列印 QR Code</title><style>${style}</style></head><body>${htmlContent}</body></html>`);

                // Dynamically load script and trigger QR generation
                const script = printWindow.document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
                script.onload = function () {
                    const script2 = printWindow.document.createElement('script');
                    script2.textContent = `
                        const ids = ${JSON.stringify(ids)};
                        ids.forEach(id => {
                            new QRCode(document.getElementById("qr-" + id), {
                                text: "${window.location.href.split('?')[0]}?m=" + id,
                                width: 150,
                                height: 150
                            });
                        });
                    `;
                    printWindow.document.body.appendChild(script2);
                };
                printWindow.document.head.appendChild(script);
                printWindow.document.close();
            }

            function showToast(m) {
                const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            }

            document.addEventListener('DOMContentLoaded', () => { if (checkLogin()) showPage('home-page'); });
        </script>
</body>

</html>
