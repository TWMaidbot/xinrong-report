<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新榮永續 報工系統</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <!-- Sidebar (Desktop Only) -->
        <aside class="sidebar">
            <div class="logo-area">
                <img src="assets/logo.png" alt="Logo">
                <h1>新榮永續</h1>
            </div>
            <nav>
                <div class="nav-link" onclick="showPage('report-page')">
                    <span class="icon">📝</span> 報工
                </div>
                <div class="nav-link" id="nav-dashboard" onclick="showPage('dashboard-page')">
                    <span class="icon">📊</span> 戰情看板
                </div>
                <div class="nav-link" id="nav-history" onclick="showPage('history-page')">
                    <span class="icon">📋</span> 報工紀錄
                </div>
                <div class="nav-link" id="nav-users" onclick="showPage('users-page')">
                    <span class="icon">👥</span> 使用者管理
                </div>
                <div class="nav-link" id="nav-machines" onclick="showPage('machines-page')">
                    <span class="icon">⚙️</span> 機台管理
                </div>
            </nav>
            <div style="margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div class="user-info" style="background:none;padding:0;color:#fff;margin:0">
                    👤 <span id="sidebar-user-name">-</span>
                    <button class="logout-btn" onclick="doLogout()">登出</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- 登入頁面 -->
            <div id="login-page" class="page active"
                style="max-width:400px;margin:20px auto;background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                <header class="header" style="border-radius:20px 20px 0 0;margin:-30px -30px 20px -30px;">
                    <div class="logo"><img src="assets/logo.png" alt="Logo" style="height: 60px;"></div>
                    <h1>新榮永續</h1>
                    <p class="subtitle">報工系統</p>
                </header>
                <div class="login-form">
                    <div class="form-group">
                        <label>工號</label>
                        <input type="text" id="login-id" placeholder="請輸入工號（如 P02）" autocomplete="off">
                        <p id="login-error" class="login-error">工號不存在，請重新輸入</p>
                    </div>
                    <div id="login-preview" class="login-preview">
                        <div class="name" id="preview-name"></div>
                        <div class="role" id="preview-role"></div>
                    </div>
                    <button class="login-btn" onclick="doLogin()">登入</button>
                    <!-- Debug Info -->
                    <div style="margin-top:20px;text-align:center;font-size:12px;color:#999">
                        Designed for Mobile & Desktop<br>
                        v1.0.0 Formal Release
                    </div>
                </div>
            </div>

            <!-- 首頁 (Mobile Only essentially, helps route on desktop) -->
            <div id="home-page" class="page">
                <header class="header">
                    <div class="logo"><img src="assets/logo.png" alt="Logo" style="height: 60px;"></div>
                    <h1>新榮永續</h1>
                    <p class="subtitle">報工系統</p>
                    <div class="user-info">
                        👤 <span id="current-user-name">-</span>
                        <button class="logout-btn" onclick="doLogout()">登出</button>
                    </div>
                </header>
                <main class="main-menu">
                    <button class="menu-btn" onclick="showPage('report-page')"><span class="icon">📝</span><span
                            class="label">報工</span></button>
                    <button class="menu-btn" id="menu-dashboard" onclick="showPage('dashboard-page')"><span
                            class="icon">📊</span><span class="label">戰情看板</span></button>
                    <button class="menu-btn" id="menu-history" onclick="showPage('history-page')"><span
                            class="icon">📋</span><span class="label">報工紀錄</span></button>
                    <button class="menu-btn" id="menu-users" onclick="showPage('users-page')"><span
                            class="icon">👥</span><span class="label">使用者管理</span></button>
                    <button class="menu-btn" id="menu-machines" onclick="showPage('machines-page')"><span
                            class="icon">⚙️</span><span class="label">機台管理</span></button>
                </main>
            </div>


            <!-- 機台管理 -->
            <div id="machines-page" class="page">
                <header class="header compact">
                    <button class="back-btn" onclick="showPage('home-page')">← 返回</button>
                    <h2>機台管理</h2>
                </header>
                <main class="user-list">
                    <div style="display:flex;gap:10px;margin-bottom:20px">
                        <button class="add-user-btn" style="margin-bottom:0" onclick="showAddMachineModal()">+
                            新增機台</button>
                        <button class="add-user-btn" style="margin-bottom:0;background:var(--accent)"
                            onclick="printAllQRCodes()">🖨️ 列印全部 QR</button>
                    </div>
                    <div id="machine-list-container"></div>
                </main>
            </div>

            <!-- 報工頁面 -->
            <div id="report-page" class="page">
                <header class="header compact">
                    <button class="back-btn" onclick="showPage('home-page')">← 返回</button>
                    <h2>報工</h2>
                </header>
                <main class="report-form">
                    <button class="scan-btn" onclick="scanQRCode()">📷 掃描機台 QR Code</button>
                    <div class="form-group">
                        <label>機台</label>
                        <select id="machine-select">
                            <option value="">選擇機台</option>
                            <optgroup label="剪台">
                                <option value="M101">M101 - 大剪台(上下剪)</option>
                                <option value="M102">M102 - 大剪台(甩剪)</option>
                                <option value="M103">M103 - 小剪台</option>
                            </optgroup>
                            <optgroup label="多片機">
                                <option value="M201">M201 - 多片機(大)</option>
                                <option value="M202">M202 - 多片機(小)</option>
                            </optgroup>
                            <optgroup label="凹槽機/斜角">
                                <option value="M301">M301 - 凹槽機(大)</option>
                                <option value="M302">M302 - 凹槽機(小)</option>
                                <option value="M303">M303 - 斜角</option>
                            </optgroup>
                            <optgroup label="合板機">
                                <option value="M401">M401 - 合板機</option>
                            </optgroup>
                            <optgroup label="棧板">
                                <option value="M501">M501 - 棧板</option>
                                <option value="M502">M502 - 棧板</option>
                                <option value="M503">M503 - 棧板</option>
                                <option value="M504">M504 - 棧板</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>工作類型</label>
                        <select id="work-type">
                            <option value="">請先選擇機台</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>數量</label>
                        <div class="quantity-input">
                            <button class="qty-btn" onclick="adjustQty(-10)">-10</button>
                            <button class="qty-btn" onclick="adjustQty(-1)">-1</button>
                            <input type="number" id="quantity" value="0" min="0">
                            <button class="qty-btn" onclick="adjustQty(1)">+1</button>
                            <button class="qty-btn" onclick="adjustQty(10)">+10</button>
                        </div>
                        <span class="unit" id="unit-label">-</span>
                    </div>
                    <div class="form-group">
                        <label>共同作業者（點選姓名）</label>
                        <div class="coworker-grid" id="coworker-list"></div>
                    </div>
                    <div class="form-group">
                        <label>備註（選填）</label>
                        <input type="text" id="note" placeholder="例：有 2 個瑕疵品">
                    </div>
                    <button class="submit-btn" onclick="submitReport()">✓ 提交報工</button>
                </main>
            </div>

            <!-- 戰情看板 -->
            <div id="dashboard-page" class="page">
                <header class="header compact">
                    <button class="back-btn" onclick="showPage('home-page')">← 返回</button>
                    <h2>戰情看板</h2>
                    <button onclick="openTVMode()"
                        style="margin-left:auto;background:#4caf50;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:14px;">📺
                        TV模式</button>
                </header>
                <main class="dashboard">
                    <div id="tv-date-header" class="tv-date-header"></div>
                    <div id="category-stats-grid" class="category-stats-grid">
                        <!-- Dynamic Content -->
                    </div>
                    <h3 class="section-title">各機台進度</h3>
                    <div id="machine-progress-container"></div>
                </main>
            </div>

            <!-- 報工紀錄 -->
            <div id="history-page" class="page">
                <header class="header compact">
                    <button class="back-btn" onclick="showPage('home-page')">← 返回</button>
                    <h2>報工紀錄</h2>
                </header>
                <main class="history">
                    <div class="filter-section">
                        <div class="filter-row">
                            <input type="date" id="filter-date-start">
                            <input type="date" id="filter-date-end">
                        </div>
                        <div class="filter-row">
                            <select id="filter-machine">
                                <option value="">全部機台</option>
                            </select>
                            <select id="filter-worker">
                                <option value="">全部員工</option>
                            </select>
                        </div>
                        <button class="filter-btn" onclick="applyFilter()">🔍 篩選</button>
                    </div>
                    <div class="export-row">
                        <button class="export-btn" onclick="exportDaily()">📅 日報表</button>
                        <button class="export-btn" onclick="exportMonthly()">📆 月報表</button>
                    </div>
                    <button class="export-btn" onclick="exportFiltered()">📥 匯出篩選結果</button>
                    <div class="history-list" id="history-list"></div>
                </main>
            </div>

            <!-- 使用者管理 -->
            <div id="users-page" class="page">
                <header class="header compact">
                    <button class="back-btn" onclick="showPage('home-page')">← 返回</button>
                    <h2>使用者管理</h2>
                </header>
                <main class="user-list">
                    <button class="add-user-btn" onclick="showAddUserModal()">+ 新增使用者</button>
                    <div id="user-list-container"></div>
                </main>
            </div>

            <!-- 機台管理 -->
            <div id="machines-page" class="page">
                <header class="header compact">
                    <button class="back-btn" onclick="showPage('home-page')">← 返回</button>
                    <h2>機台管理</h2>
                </header>
                <main class="machine-list" style="padding-bottom: 80px;">
                    <button class="add-user-btn" onclick="showAddMachineModal()">+ 新增機台</button>
                    <button class="export-btn" onclick="printAllQRCodes()"
                        style="width:100%;margin-top:10px;background:#607d8b">🖨️ 列印所有 QR Code</button>
                    <div id="machine-list-container"
                        style="display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:15px;margin-top:20px;">
                    </div>
                </main>
            </div>

            <div id="toast" class="toast"></div>
    </div>

    <!-- 新增/編輯使用者 Modal -->
    <div id="user-modal" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title">新增使用者</h3>
            <div class="form-group">
                <label>工號</label>
                <input type="text" id="modal-id" placeholder="如 P25">
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="modal-name" placeholder="員工姓名">
            </div>
            <div class="form-group">
                <label>權限</label>
                <select id="modal-role">
                    <option value="worker">一般員工</option>
                    <option value="manager">主管</option>
                    <option value="admin">管理者</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeUserModal()">取消</button>
                <button class="btn-save" onclick="saveUser()">儲存</button>
            </div>
        </div>
    </div>

    <!-- 新增/編輯機台 Model -->
    <div id="machine-modal" class="modal-overlay">
        <div class="modal">
            <h3 id="machine-modal-title">新增機台</h3>
            <div class="form-group">
                <label>機台編號</label>
                <input type="text" id="machine-id" placeholder="如 M101">
            </div>
            <div class="form-group">
                <label>機台名稱</label>
                <input type="text" id="machine-name" placeholder="機台名稱">
            </div>
            <div class="form-group">
                <label>分類 (自動對應工作類型)</label>
                <select id="machine-category">
                    <option value="剪台">剪台</option>
                    <option value="多片機">多片機</option>
                    <option value="凹槽機/斜角">凹槽機/斜角</option>
                    <option value="合板機">合板機</option>
                    <option value="棧板">棧板</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeMachineModal()">取消</button>
                <button class="btn-save" onclick="saveMachineUI()">儲存</button>
            </div>
        </div>
    </div>

    <!-- 掃描器 Modal (Moved out) -->
    <div id="scanner-modal" class="modal-overlay">
        <div class="modal" style="max-width: 500px;">
            <h3>掃描機台 QR Code</h3>
            <div id="reader" style="width: 100%; min-height: 300px; background: #000;"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="stopScanner()">關閉</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- 載入 Firebase 設定 -->
    <script src="firebase-config.js"></script>

    <!-- QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>

</html>
